<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shaemless — Links</title>
  <meta name="description" content="Official links for Shaemless — music, videos, merch and socials." />

  <style>
    :root {
      --bg: #0b0b0d;
      --bg-soft: #141417;
      --surface: #18181c;
      --surface-hover: #232329;
      --border: #2a2a31;
      --text: #f5f5f7;
      --muted: #8a8a93;
      --accent: #ff3b3b;
      --accent-soft: rgba(255, 59, 59, 0.12);
      --radius: 14px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background:
        radial-gradient(900px 500px at 50% -10%, rgba(255, 59, 59, 0.10), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 48px 20px 56px;
    }

    /* PROFILE */
    .profile {
      text-align: center;
      margin-bottom: 36px;
    }

    .profile-pic {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--border);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.45);
    }

    .profile h1 {
      margin: 16px 0 4px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .profile .subtitle {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
    }

    /* SECTIONS */
    .section-title {
      font-size: 12px;
      color: var(--muted);
      margin: 32px 4px 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* FEATURED CARD */
    .featured {
      background: linear-gradient(180deg, var(--accent-soft), rgba(255, 59, 59, 0.03));
      border: 1px solid rgba(255, 59, 59, 0.25);
      border-radius: 18px;
      padding: 18px 18px 14px;
    }

    .featured .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      background: var(--accent-soft);
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .featured .track {
      font-size: 18px;
      font-weight: 700;
      margin: 0 0 2px;
    }

    .featured .track-sub {
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 14px;
    }

    .streaming-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* LINK BUTTONS */
    .link {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      color: var(--text);
      text-decoration: none;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-weight: 600;
      font-size: 15px;
      transition: background 0.18s ease, transform 0.18s ease, border-color 0.18s ease;
    }

    .link:hover {
      background: var(--surface-hover);
      border-color: #3a3a44;
      transform: translateY(-2px);
    }

    .link.compact { font-size: 14px; padding: 12px 14px; }

    .stack > * + * { margin-top: 10px; }

    .icon-badge {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      border-radius: 9px;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .icon-badge img { width: 22px; height: 22px; display: block; }

    /* Some brand marks ship as a white glyph — give them a colored badge so they stay visible */
    .icon-badge.on-soundcloud { background: #ff5500; }
    .icon-badge.on-tidal { background: #000000; }

    .link .label { flex: 1; min-width: 0; }
    .link .chevron { color: var(--muted); flex: 0 0 auto; }

    /* CONNECT ROW */
    .connect {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 14px;
    }

    .connect a {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.18s ease, transform 0.18s ease;
    }

    .connect a:hover { background: var(--surface-hover); transform: translateY(-2px); }

    .connect .icon-badge {
      width: 30px;
      height: 30px;
      border-radius: 50%;
    }
    .connect .icon-badge img { width: 18px; height: 18px; }

    .footer {
      margin-top: 40px;
      text-align: center;
      font-size: 12px;
      color: #5c5c66;
    }
  </style>
</head>

<body>
