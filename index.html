<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Shaemless</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400&family=Space+Grotesk:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
</head>

<body>

<div class="accordion">

  <!-- SHAEMLESS -->
  <div class="panel active">
    <div class="label" onclick="openPanel(0)">
      <span>SHAEMLESS</span>
    </div>
    <div class="content">
      <h1>Shaemless</h1>
      <p>Post-punk events, concerts, and underground culture.</p>
      <a href="/webshop.html" class="button">Webshop</a>
    </div>
  </div>

  <!-- SHOWS -->
  <div class="panel">
    <div class="label" onclick="openPanel(1)">
      <span>SHOWS</span>
    </div>
    <div class="content">
      <h2>Shows</h2>

      <div id="events-list"></div>

      <script>
      fetch("events.json")
        .then(response => response.json())
        .then(events => {
          // Sort by date (newest first)
          events.sort((a, b) => new Date(b.date) - new Date(a.date));

          let container = document.getElementById("events-list");

          events.forEach(event => {
            let item = document.createElement("div");
            item.className = "event-item";

            item.innerHTML = `
              <a href="${event.link}" class="event-link">
                <strong>${event.title}</strong><br>
                ${formatDate(event.date)} — ${event.location}
              </a>
            `;

            container.appendChild(item);
          });
        });

      function formatDate(dateString) {
        let date = new Date(dateString);
        return date.toLocaleDateString("en-GB", {
          day: "2-digit",
          month: "short",
          year: "numeric"
        });
      }
      </script>

    </div>
  </div>

  

  <!-- INSTAGRAM -->
  <div class="panel">
    <div class="label" onclick="openPanel(2)">
      <span>INSTAGRAM</span>
    </div>
    <div class="content">
      <h2>Instagram</h2>
      {% include instagram.html %}
    </div>
  </div>
  
  <!-- WEBSHOP -->
  <div class="panel">
    <div class="label" onclick="openPanel(3)">
      <span>WEBSHOP</span>
    </div>
    <div class="content">
      <h2>Webshop</h2>
      <p>
        Visit our webshop for merchandise, records and tickets.
      </p>
      <a href="/webshop.html" class="button">Go to Webshop</a>
    </div>
  </div>

  <!-- CONTACT -->
  <div class="panel">
    <div class="label" onclick="openPanel(4)">
      <span>CONTACT</span>
    </div>
    <div class="content">
      <h2>Contact</h2>

      <form action="https://formspree.io/f/mbdpgepo" method="POST" class="contact-form">
        <label>
          Name
          <input type="text" name="name" required>
        </label>

        <label>
          Email
          <input type="email" name="email" required>
        </label>

        <label>
          Message
          <textarea name="message" rows="5" required></textarea>
        </label>

        <button type="submit" class="button">Send</button>
      </form>

    </div>
</div>

</div>

<script>
function openPanel(index) {
  let panels = document.querySelectorAll(".panel");
  panels.forEach((panel, i) => {
    if (i === index) {
      panel.classList.add("active");
    } else {
      panel.classList.remove("active");
    }
  });
}
</script>

</body>
</html>
